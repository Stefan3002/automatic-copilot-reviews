name: Leave PR Comment

# This ensures it runs when a PR is opened or updated
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  comment:
    runs-on: ubuntu-latest
    
    # 🚨 CRITICAL: Gives the action permission to leave a comment
    permissions:
      pull-requests: write 

    steps:
      - name: Post comment using GitHub CLI
        # 🚨 CRITICAL: Hands the CLI the keys to your repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 🚨 CRITICAL: Uses dynamic variables for the PR number and Repo name
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "👋 **Success!** The action successfully commented on the right PR."

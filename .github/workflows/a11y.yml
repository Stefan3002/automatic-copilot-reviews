name: Leave PR Comment

on:
  pull_request:
    types: [opened, synchronize] # Triggers when a PR is opened or new commits are pushed

jobs:
  comment:
    runs-on: ubuntu-latest
    
    # Explicitly grant permission to write to pull requests
    permissions:
      pull-requests: write 

    steps:
      - name: Post comment using GitHub CLI
        env:
          # The built-in token needed to authenticate the CLI
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "👋 **@copilot Use the a11y-review skill to analyze the errors listed in the .json file."
